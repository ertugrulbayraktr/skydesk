services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD:-YourStrong!Passw0rd}"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"${SQL_SA_PASSWORD:-YourStrong!Passw0rd}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mssql-data:/var/opt/mssql

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: true
    ports:
      - "8081:80"   # Seq UI
      - "5341:5341" # ingestion
    volumes:
      - seq-data:/data

  api:
    build: .
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=Skydesk;User Id=sa;Password=${SQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=true;MultipleActiveResultSets=true;"
      Jwt__Secret: "${JWT_SECRET:?Set JWT_SECRET (min 32 chars) in .env}"
      Gemini__ApiKey: "${GEMINI_API_KEY:-}"
      Seq__Url: "http://seq:5341"
    ports:
      - "5098:8080"

  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mssql-data:
  seq-data:
